<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘倩教u商是骗子</title>
    <meta name="description" content="警告信息页面，刘倩教u商相关内容。">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>刘倩教u商是骗子</h1>
    </header>

    <main id="content">
        <p>加载中...</p>
    </main>

    <footer>
        <p>&copy; 2026 警告信息页面</p>
    </footer>

    <script src="js/marked.min.js"></script>
    <script>
        // 渲染 Markdown
        fetch('content.md')
            .then(res => res.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p>加载失败</p>';
                console.error(err);
            });
    </script>
</body>
</html>
